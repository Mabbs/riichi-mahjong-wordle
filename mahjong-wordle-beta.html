<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将 Wordle - 立直 & 国标</title>
    <style>
        @font-face {
            font-family: 'Riichi Mahjong Colorful';
            src: url('Riichi-Mahjong-Colorful.woff2');
        }

        :root {
            --green: #538d4e;
            --yellow: #b59f3b;
            --gray: #3a3a3c;
            --dark-gray: #5a5a5c;
            --light-gray: #818384;
            --bg: #121213;
            --text: #ffffff;
            --tile-bg: #ffffff;
            --cell-border: #3a3a3c;
            --panel-bg: #1e1e1e;
            --panel-border: #444;
            --accent: #e6c34a;
            --emoji-font: "Riichi Mahjong Colorful", "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Noto Emoji", sans-serif;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --text: #1a1a1a;
            --tile-bg: #f0f0f0;
            --cell-border: #d0d0d0;
            --panel-bg: #f5f5f5;
            --panel-border: #ccc;
            --gray: #b0b0b0;
            --light-gray: #d3d6da;
            --dark-gray: #666;
            --accent: #b8860b;
            --green: #6aaa64;
            --yellow: #c9b458;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 16px 8px;
            min-height: 100vh;
            font-family: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            max-width: 620px;
            margin-bottom: 6px;
        }

        .topbar-side {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
        }

        .topbar-side:first-child {
            visibility: hidden;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-align: center;
        }

        .variant-switch,
        .mode-switch {
            display: flex;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .variant-switch {
            margin-bottom: 8px;
            border: 2px solid var(--accent);
        }

        .mode-switch {
            margin-bottom: 12px;
            border: 1px solid var(--panel-border);
        }

        .variant-btn,
        .mode-btn {
            border: none;
            background: var(--panel-bg);
            color: var(--text);
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        .variant-btn {
            padding: 2px 13px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .variant-btn.active {
            background: var(--accent);
            color: #000;
        }

        .mode-btn {
            padding: 6px 14px;
            font-size: 13px;
        }

        .mode-btn.active {
            background: var(--green);
            color: #fff;
            font-weight: bold;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: background-color 0.2s;
            line-height: 1;
        }

        .icon-btn:hover {
            background-color: var(--panel-border);
        }

        .subtitle {
            color: var(--dark-gray);
            margin-bottom: 4px;
            font-size: 13px;
            text-align: center;
            line-height: 1.5;
        }

        .subtitle .highlight {
            color: var(--accent);
            font-weight: bold;
        }

        .hint-bar {
            color: var(--dark-gray);
            font-size: 12px;
            margin-bottom: 6px;
            text-align: center;
        }

        .hint-bar .key-hint {
            display: inline-block;
            background: var(--panel-bg);
            color: var(--accent);
            padding: 2px 7px;
            border-radius: 3px;
            margin: 0 2px;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 0.5px;
            border: 1px solid var(--panel-border);
        }

        #game-info {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 8px 18px;
            margin-bottom: 16px;
            font-size: 15px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        #game-info span {
            color: var(--accent);
            font-weight: bold;
        }

        #hard-mode-info {
            display: none;
            color: var(--accent);
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
            margin-top: -8px;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            gap: 4px;
        }

        .cell {
            width: 42px;
            height: 56px;
            border: 2px solid var(--cell-border);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-family: var(--emoji-font);
            user-select: none;
            transition: background-color .15s, border-color .15s, transform .2s;
        }

        .cell:nth-child(14) {
            margin-left: 10px;
            border-left: 3px dashed #666;
        }

        .cell.filled {
            background-color: var(--tile-bg);
            color: #000;
            border-color: #999;
        }

        .cell.pending-number {
            font-family: "Helvetica Neue", Arial, sans-serif;
            color: var(--dark-gray);
            border-color: var(--dark-gray);
            border-style: dashed;
            background-color: rgba(255, 255, 255, 0.04);
            font-size: 28px;
            font-weight: bold;
            animation: pulse-pending 1.2s ease-in-out infinite;
        }

        @keyframes pulse-pending {

            0%,
            100% {
                border-color: var(--dark-gray)
            }

            50% {
                border-color: #b0b0b0
            }
        }

        .cell.correct {
            background-color: var(--green);
            border-color: var(--green);
            color: white;
        }

        .cell.present {
            background-color: var(--yellow);
            border-color: var(--yellow);
            color: white;
        }

        .cell.absent {
            background-color: var(--gray);
            border-color: var(--gray);
            color: white;
        }

        .cell.flip {
            animation: flip 0.5s ease;
        }

        @keyframes flip {

            0%,
            100% {
                transform: rotateX(0)
            }

            50% {
                transform: rotateX(90deg)
            }
        }

        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            max-width: 620px;
            width: 100%;
        }

        .key-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .key {
            padding: 5px 9px;
            border-radius: 5px;
            background-color: var(--light-gray);
            border: none;
            color: white;
            font-size: 30px;
            font-family: var(--emoji-font);
            cursor: pointer;
            user-select: none;
            transition: background-color .2s, transform .05s;
            min-width: 36px;
            text-align: center;
            line-height: 1.2;
        }

        [data-theme="light"] .key {
            color: #1a1a1a;
            background-color: #d3d6da;
        }

        .key:hover {
            filter: brightness(1.25);
        }

        .key:active {
            filter: brightness(0.85);
            transform: scale(0.94);
        }

        .key.action {
            font-size: 15px;
            font-weight: bold;
            padding: 14px 18px;
            font-family: inherit;
            min-width: 70px;
            letter-spacing: 1px;
            background-color: #555;
        }

        [data-theme="light"] .key.action {
            color: #fff;
            background-color: #6b6b6b;
        }

        .key.action:hover {
            background-color: #777;
        }

        [data-theme="light"] .key.action:hover {
            background-color: #555;
        }

        .key.action.submit-btn {
            background-color: #4a7c4f;
        }

        .key.action.submit-btn:hover {
            background-color: #5d9e63;
        }

        .key.action.hint-btn {
            background-color: #b07d3b;
        }

        .key.action.hint-btn:hover {
            background-color: #c88e44;
        }

        .key.action.refresh-btn {
            background-color: #4a4a6a;
        }

        .key.action.refresh-btn:hover {
            background-color: #6a6a8a;
        }

        .key.key-correct {
            background-color: var(--green);
            border: 1px solid #6ab464;
        }

        .key.key-present {
            background-color: var(--yellow);
            border: 1px solid #d4b840;
        }

        .key.key-absent {
            background-color: var(--gray);
            border: 1px solid #444;
            color: #666;
        }

        #message {
            position: fixed;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 14px 22px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 400;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            white-space: pre-line;
            max-width: 90vw;
        }

        .show-message {
            opacity: 1 !important;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 24px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            margin: 0 0 16px 0;
            font-size: 20px;
            text-align: center;
        }

        .modal .close-btn {
            float: right;
            background: none;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stat-cell .num {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent);
        }

        .stat-cell .label {
            font-size: 11px;
            color: var(--dark-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dist-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }

        .dist-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .dist-row .guess-num {
            font-size: 12px;
            font-weight: bold;
            width: 14px;
            text-align: center;
        }

        .dist-bar {
            height: 22px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            min-width: 24px;
        }

        .dist-bar.green {
            background: var(--green);
        }

        .dist-bar.gray {
            background: var(--gray);
        }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
        }

        .countdown {
            font-size: 12px;
            color: var(--dark-gray);
            text-align: center;
            flex: 1;
        }

        .share-btn {
            background: var(--green);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        .share-btn:hover {
            filter: brightness(1.15);
        }

        .modal-text {
            font-size: 14px;
            line-height: 1.7;
        }

        .modal-text .example-cell {
            display: inline-flex;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            align-items: center;
            justify-content: center;
            font-family: var(--emoji-font);
            font-size: 18px;
            margin: 2px;
            vertical-align: middle;
        }

        .modal-text .ex-correct {
            background: var(--green);
            color: white;
        }

        .modal-text .ex-present {
            background: var(--yellow);
            color: white;
        }

        .modal-text .ex-absent {
            background: var(--gray);
            color: white;
        }

        @media (max-width: 580px) {
            .mode-btn {
                padding: 6px 10px;
                font-size: 12px;
            }

            .cell {
                width: 22px;
                height: 32px;
                font-size: 22px;
                border-width: 1.5px;
                border-radius: 3px;
            }

            .cell:nth-child(14) {
                margin-left: 4px;
                border-left-width: 2px;
            }

            .cell.pending-number {
                font-size: 15px;
            }

            .key {
                font-size: 18px;
                padding: 5px 6px;
                min-width: 26px;
                border-radius: 3px;
            }

            .key.action {
                font-size: 13px;
                padding: 10px 12px;
                min-width: 56px;
            }

            h1 {
                font-size: 20px;
            }

            .subtitle {
                font-size: 11px;
            }

            .hint-bar {
                font-size: 10px;
            }

            .hint-bar .key-hint {
                font-size: 10px;
                padding: 1px 5px;
            }

            .row {
                gap: 2px;
            }

            #board {
                gap: 4px;
            }

            #game-info {
                font-size: 13px;
                padding: 6px 12px;
                gap: 12px;
            }

            .stat-cell .num {
                font-size: 22px;
            }

            .icon-btn {
                font-size: 18px;
                padding: 4px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="topbar-side"></div>
        <h1 id="game-title">🀫 立直麻将 Wordle</h1>
        <div class="topbar-side">
            <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="切换主题">☀️</button>
            <button class="icon-btn" onclick="openModal('info')" title="玩法说明">❓</button>
            <button class="icon-btn" onclick="openModal('stats')" title="统计" id="stats-icon">📊</button>
        </div>
    </div>
    <div class="variant-switch">
        <button class="variant-btn active" id="variant-riichi" onclick="switchVariant('riichi')">🇯🇵 立直麻将</button>
        <button class="variant-btn" id="variant-guobiao" onclick="switchVariant('guobiao')">🇨🇳 国标麻将</button>
    </div>
    <div class="mode-switch">
        <button class="mode-btn active" id="mode-daily" onclick="switchMode('daily')">📅 每日挑战</button>
        <button class="mode-btn" id="mode-practice" onclick="switchMode('practice')">♾️ 无限练习</button>
        <button class="mode-btn" id="mode-hard" onclick="switchMode('hard')">🔥 困难模式</button>
    </div>
    <div class="subtitle" id="subtitle"></div>
    <div class="hint-bar">💡 键盘快捷输入：<span class="key-hint">数字</span> + <span class="key-hint">M/P/S/Z</span> 可连续输入如
        <span class="key-hint">1</span><span class="key-hint">2</span><span class="key-hint">3</span><span
            class="key-hint">M</span> = 1万2万3万
    </div>
    <div id="game-info">
        <span id="wind-label">场风</span>：<span id="field-wind-display"></span>
        <span id="self-wind-label">自风</span>：<span id="self-wind-display"></span>
        · 和牌方式：<span id="win-method-display"></span>
    </div>
    <div id="hard-mode-info"></div>
    <div id="board"></div>
    <div id="keyboard">
        <div class="key-row" id="row-man"></div>
        <div class="key-row" id="row-pin"></div>
        <div class="key-row" id="row-sou"></div>
        <div class="key-row" id="row-ji"></div>
        <div class="key-row" style="margin-top:4px;">
            <button class="key action" onclick="deleteTile()">⌫ 删除</button>
            <button class="key action submit-btn" onclick="submitGuess()">✓ 提交</button>
            <button class="key action hint-btn" id="btn-hint" onclick="showHint()">💡 提示</button>
            <button class="key action refresh-btn" id="btn-new-game" onclick="newGame()">🔄 新局</button>
        </div>
    </div>
    <div id="message"></div>
    <div class="modal-overlay" id="modal-info">
        <div class="modal">
            <button class="close-btn" onclick="closeModal('info')">×</button>
            <h2>🀄 玩法说明</h2>
            <div class="modal-text">
                <p>猜出目标的 14 张牌（13张+1张和牌），共 6 次机会。</p>
                <p>每次提交后，牌会变色：<br><span class="example-cell ex-correct">🀇</span> 正确位置 <span
                        class="example-cell ex-present">🀇</span> 位置不对 <span class="example-cell ex-absent">🀇</span>
                    不在答案中</p>
                <p><b>输入：</b>键盘数字+花色（1m=1万，5z=白）或点击屏幕牌</p>
                <p>🇯🇵 立直 — 需要有役（或门清自摸）<br>🇨🇳 国标 — 需要至少8番起和</p>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modal-stats">
        <div class="modal">
            <button class="close-btn" onclick="closeModal('stats')">×</button>
            <h2 id="stats-title">📊 统计</h2>
            <div id="stats-content">
                <div class="stat-grid">
                    <div class="stat-cell">
                        <div class="num" id="stat-played">0</div>
                        <div class="label">已玩</div>
                    </div>
                    <div class="stat-cell">
                        <div class="num" id="stat-winrate">0</div>
                        <div class="label">胜率%</div>
                    </div>
                    <div class="stat-cell">
                        <div class="num" id="stat-streak">0</div>
                        <div class="label">连胜</div>
                    </div>
                    <div class="stat-cell">
                        <div class="num" id="stat-maxstreak">0</div>
                        <div class="label">最大连胜</div>
                    </div>
                </div>
                <div class="dist-title">猜对所用次数分布</div>
                <div id="dist-container"></div>
                <div class="modal-footer">
                    <div class="countdown" id="countdown"></div>
                    <button class="share-btn" onclick="shareResult()">📋 分享成绩</button>
                </div>
            </div>
            <div id="practice-stats"
                style="display:none;text-align:center;color:var(--dark-gray);font-size:14px;padding:20px 0;">
                练习模式不计入统计<br>本局用了 <span id="practice-tries">0</span> 次猜测</div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const $$ = sel => document.querySelectorAll(sel);
        const TILES = ['🀇', '🀈', '🀉', '🀊', '🀋', '🀌', '🀍', '🀎', '🀏', '🀙', '🀚', '🀛', '🀜', '🀝', '🀞', '🀟', '🀠', '🀡', '🀐', '🀑', '🀒', '🀓', '🀔', '🀕', '🀖', '🀗', '🀘', '🀀', '🀁', '🀂', '🀃', '🀆', '🀅', '🀄'];
        const TOTAL_TILE_TYPES = 34, GUESS_LENGTH = 14, MAX_ROWS = 6;
        const KOKUSHI_INDICES = [0, 8, 9, 17, 18, 26, 27, 28, 29, 30, 31, 32, 33];
        const YAOCHU_INDICES = new Set(KOKUSHI_INDICES);
        const GREEN_TILES = new Set([19, 20, 21, 23, 25, 32]);
        const WIND_NAMES = ['东', '南', '西', '北'];
        const game = { variant: 'riichi', mode: 'daily', targetHand: [], currentGuess: [], pendingNumbers: [], currentRow: 0, gameOver: false, gameWon: false, keyColors: Array(TOTAL_TILE_TYPES).fill(''), fieldWind: 0, selfWind: 0, isTsumo: true, guessHistory: [], theme: 'dark', dailyDate: '', targetYaku: [] };
        const LS = { get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d } catch { return d } }, set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)) } catch { } } };
        const lsPrefix = () => 'mw_' + game.variant + '_';
        const getCounts = arr => arr.reduce((acc, val) => { acc[val]++; return acc }, Array(TOTAL_TILE_TYPES).fill(0));
        const getTileName = i => i < 27 ? `${(i % 9) + 1}${['万', '筒', '索'][i / 9 | 0]}` : WIND_NAMES.concat(['白', '发', '中'])[i - 27];
        const sortGuessLikeTarget = guess => [...guess.slice(0, 13).sort((a, b) => a - b), guess[13]];
        const isKokushiShape = counts => KOKUSHI_INDICES.every(i => counts[i] >= 1) && KOKUSHI_INDICES.reduce((s, i) => s + counts[i], 0) === 14;
        const isSevenPairs = counts => counts.filter(c => c === 2).length === 7;
        function mulberry32(a) { return () => { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296 } }

        function getTodaySeed() {

            $('field-wind-display').innerHTML = TILES[27 + game.fieldWind] + ' ' + WIND_NAMES[game.fieldWind];
            $('self-wind-display').innerHTML = TILES[27 + game.selfWind] + ' ' + WIND_NAMES[game.selfWind];
            $('win-method-display').innerHTML = game.isTsumo ? '🚀 自摸' : '🎯 荣和';
            updateVariantUI(); createBoard(); createKeyboard(); renderBoardFromHistory(); applyKeyColors();
            closeModal('stats'); closeModal('info');
        }
        document.addEventListener('keydown', e => {
            if (game.gameOver) return e.key === 'Enter' && closeModal('stats');
            const k = e.key.toLowerCase();
            if (['backspace', 'delete'].includes(k)) { e.preventDefault(); deleteTile() }
            else if (k === 'enter') { e.preventDefault(); submitGuess() }
            else if (/^[1-9]$/.test(k)) { e.preventDefault(); if (game.currentGuess.length + game.pendingNumbers.length < GUESS_LENGTH) { game.pendingNumbers.push(+k); updateGrid() } }
            else if (['m', 'p', 's', 'z'].includes(k) && game.pendingNumbers.length) {
                e.preventDefault();
                if (game.currentGuess.length + game.pendingNumbers.length > GUESS_LENGTH) { game.pendingNumbers = []; return updateGrid() }
                const idxs = game.pendingNumbers.map(n => { const b = { m: 0, p: 9, s: 18, z: 27 }[k], m = k === 'z' ? 7 : 9; return (b !== undefined && n >= 1 && n <= m) ? b + n - 1 : -1 });
                if (idxs.includes(-1)) { showMessage(`无效代码: ${game.pendingNumbers[idxs.indexOf(-1)]}${k}`); game.pendingNumbers = []; return updateGrid() }
                const tmpC = getCounts(game.currentGuess); if (idxs.some(ti => ++tmpC[ti] > 4)) { showMessage('一种牌最多只能有4张哦～'); return updateGrid() }
                game.currentGuess.push(...idxs); game.pendingNumbers = []; updateGrid();
            }
        });
        const getStats = () => LS.get(lsPrefix() + 'stats', { played: 0, wins: 0, currentStreak: 0, maxStreak: 0, dist: [0, 0, 0, 0, 0, 0] });
        function addStat(w, t) { const s = getStats(); s.played++; if (w) { s.wins++; s.maxStreak = Math.max(s.maxStreak, ++s.currentStreak); if (t >= 1 && t <= 6) s.dist[t - 1]++ } else s.currentStreak = 0; LS.set(lsPrefix() + 'stats', s) }
        function renderStats() {
            if (game.mode !== 'daily') { $('stats-content').style.display = 'none'; $('practice-stats').style.display = 'block'; $('practice-tries').innerText = game.guessHistory.length; $('stats-title').innerText = game.mode === 'hard' ? '🔥 困难练习' : '♾️ 练习模式'; return }
            $('stats-content').style.display = 'block'; $('practice-stats').style.display = 'none'; $('stats-title').innerText = '📊 每日统计 (' + (game.variant === 'riichi' ? '立直' : '国标') + ')';
            const s = getStats(), maxD = Math.max(...s.dist, 1);
            $('stat-played').innerText = s.played; $('stat-winrate').innerText = s.played ? Math.round(s.wins / s.played * 100) : 0; $('stat-streak').innerText = s.currentStreak; $('stat-maxstreak').innerText = s.maxStreak;
            $('dist-container').innerHTML = s.dist.map((d, i) => `<div class="dist-row"><div class="guess-num">${i + 1}</div><div class="dist-bar ${game.gameWon && game.currentRow === i + 1 ? 'green' : 'gray'}" style="width:${Math.max(8, d / maxD * 100)}%">${d}</div></div>`).join('');
        }
        function shareResult() {
            if (game.mode !== 'daily') return showMessage('练习模式无法分享'); if (!game.guessHistory.length) return showMessage('还没有完成的局');
            const emj = { correct: '🟩', present: '🟨', absent: '⬜' }, txt = `${game.variant === 'riichi' ? '立直麻将Wordle' : '国标麻将Wordle'} ${game.dailyDate} ${game.gameWon ? game.guessHistory.length : 'X'}/${MAX_ROWS}\n${location.origin}${location.pathname}\n\n` + game.guessHistory.map(r => r.map((c, i) => emj[c.color] + (i === 12 ? ' ' : '')).join('')).join('\n');
            navigator.clipboard.writeText(txt).then(() => showMessage('已复制到剪贴板！')).catch(() => showMessage(txt, 5000));
        }
        function updateCountdown() {
            if (game.mode !== 'daily') return $('countdown').innerText = '';
            const n = new Date(), d = new Date(n.getFullYear(), n.getMonth(), n.getDate() + 1) - n, pad = x => String(Math.floor(x)).padStart(2, '0');
            $('countdown').innerText = `下期题目\n⏰ ${pad(d / 3600000)}:${pad(d % 3600000 / 60000)}:${pad(d % 60000 / 1000)}`;
        }
        game.theme = LS.get('mw_theme', 'dark'); document.body.setAttribute('data-theme', game.theme); $('theme-btn').innerText = game.theme === 'dark' ? '☀️' : '🌙';
        updateVariantUI(); newGame();
        setInterval(updateCountdown, 1000); updateCountdown();
    </script>
</body>
