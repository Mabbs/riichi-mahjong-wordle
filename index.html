<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>立直麻将 Wordle</title>
    <style>
        :root {
            --green: #538d4e;
            --yellow: #b59f3b;
            --gray: #3a3a3c;
            --dark-gray: #5a5a5c;
            --light-gray: #818384;
            --bg: #121213;
            --text: #ffffff;
            --tile-bg: #ffffff;
            --cell-border: #3a3a3c;
            --emoji-font: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Noto Emoji", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 16px 8px;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 2px;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 4px;
            font-size: 13px;
            text-align: center;
            line-height: 1.5;
        }
        .subtitle .highlight {
            color: #e6c34a;
            font-weight: bold;
        }

        .hint-bar {
            color: #888;
            font-size: 12px;
            margin-bottom: 6px;
            text-align: center;
        }
        .hint-bar .key-hint {
            display: inline-block;
            background: #333;
            color: #e6c34a;
            padding: 2px 7px;
            border-radius: 3px;
            margin: 0 2px;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        #game-info {
            background-color: #1e1e1e;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 8px 18px;
            margin-bottom: 16px;
            font-size: 15px;
            color: #ddd;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        #game-info span {
            color: #e6c34a;
            font-weight: bold;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            gap: 4px;
        }

        .cell {
            width: 42px;
            height: 56px;
            border: 2px solid var(--cell-border);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 34px;
            font-family: var(--emoji-font);
            background-color: transparent;
            user-select: none;
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }

        .cell:nth-child(14) {
            margin-left: 10px;
            border-left: 3px dashed #666;
        }

        .cell.filled {
            background-color: var(--tile-bg);
            color: #000;
            border-color: #999;
        }

        .cell.pending-number {
            font-family: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #aaa;
            border-color: #888;
            border-style: dashed;
            background-color: rgba(255, 255, 255, 0.04);
            font-size: 28px;
            font-weight: bold;
            animation: pulse-pending 1.2s ease-in-out infinite;
        }

        @keyframes pulse-pending {
            0%,
            100% {
                border-color: #777;
            }
            50% {
                border-color: #b0b0b0;
            }
        }

        .cell.correct {
            background-color: var(--green);
            border-color: var(--green);
            color: white;
        }
        .cell.present {
            background-color: var(--yellow);
            border-color: var(--yellow);
            color: white;
        }
        .cell.absent {
            background-color: var(--gray);
            border-color: var(--gray);
            color: white;
        }

        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            max-width: 620px;
            width: 100%;
        }

        .key-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .key {
            padding: 7px 9px;
            border-radius: 5px;
            background-color: var(--light-gray);
            border: none;
            color: white;
            font-size: 24px;
            font-family: var(--emoji-font);
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s ease;
            min-width: 36px;
            text-align: center;
            line-height: 1.2;
        }

        .key:hover {
            filter: brightness(1.25);
        }
        .key:active {
            filter: brightness(0.85);
            transform: scale(0.94);
            transition: transform 0.05s ease;
        }

        .key.action {
            font-size: 15px;
            font-weight: bold;
            padding: 14px 22px;
            font-family: inherit;
            min-width: 80px;
            letter-spacing: 1px;
            background-color: #555;
        }
        .key.action:hover {
            background-color: #777;
        }
        .key.action.submit-btn {
            background-color: #4a7c4f;
        }
        .key.action.submit-btn:hover {
            background-color: #5d9e63;
        }
        .key.action.hint-btn {
            background-color: #b07d3b;
        }
        .key.action.hint-btn:hover {
            background-color: #c88e44;
        }
        .key.action.refresh-btn {
            background-color: #4a4a6a;
        }
        .key.action.refresh-btn:hover {
            background-color: #6a6a8a;
        }

        .key.key-correct {
            background-color: var(--green);
            border: 1px solid #6ab464;
        }
        .key.key-present {
            background-color: var(--yellow);
            border: 1px solid #d4b840;
        }
        .key.key-absent {
            background-color: #2a2a2c;
            border: 1px solid #444;
            color: #666;
        }

        #message {
            position: fixed;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.92);
            color: #000;
            padding: 14px 22px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            white-space: pre-line;
            max-width: 90vw;
        }

        .show-message {
            opacity: 1 !important;
        }

        @media (max-width: 580px) {
            .cell {
                width: 22px;
                height: 32px;
                font-size: 18px;
                border-width: 1.5px;
                border-radius: 3px;
            }
            .cell:nth-child(14) {
                margin-left: 4px;
                border-left-width: 2px;
            }
            .cell.pending-number {
                font-size: 15px;
            }
            .key {
                font-size: 18px;
                padding: 5px 6px;
                min-width: 26px;
                border-radius: 3px;
            }
            .key.action {
                font-size: 13px;
                padding: 10px 14px;
                min-width: 60px;
            }
            h1 {
                font-size: 22px;
            }
            .subtitle {
                font-size: 11px;
            }
            .hint-bar {
                font-size: 10px;
            }
            .hint-bar .key-hint {
                font-size: 10px;
                padding: 1px 5px;
            }
            .row {
                gap: 2px;
            }
            #board {
                gap: 4px;
            }
            #game-info {
                font-size: 13px;
                padding: 6px 12px;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <h1>🀫 立直麻将 Wordle</h1>
    <div class="subtitle">
        猜出14张牌的<span class="highlight">有役和牌型</span>（最后一张为和牌）<br>
        前13张按 <span class="highlight">万→筒→索→字</span> 排序 · 共6次机会
    </div>
    <div class="hint-bar">
        💡 键盘快捷输入：<span class="key-hint">数字</span> + <span class="key-hint">M/P/S/Z</span>
        &nbsp;可连续输入数字如 <span class="key-hint">1</span><span class="key-hint">2</span><span class="key-hint">3</span><span class="key-hint">M</span> = 1万2万3万 ·
        <span class="key-hint">1</span><span class="key-hint">Z</span> = 东
    </div>

    <div id="game-info">
        场风：<span id="field-wind-display"></span>
        自风：<span id="self-wind-display"></span>
        · 和牌方式：<span id="win-method-display"></span>
    </div>

    <div id="board"></div>

    <div id="keyboard">
        <div class="key-row" id="row-man"></div>
        <div class="key-row" id="row-pin"></div>
        <div class="key-row" id="row-sou"></div>
        <div class="key-row" id="row-ji"></div>
        <div class="key-row" style="margin-top:4px;">
            <button class="key action" onclick="deleteTile()">⌫ 删除</button>
            <button class="key action submit-btn" onclick="submitGuess()">✓ 提交和牌</button>
            <button class="key action hint-btn" onclick="showHint()">💡 提示</button>
            <button class="key action refresh-btn" onclick="location.reload()">🔄 新游戏</button>
        </div>
    </div>

    <div id="message"></div>

    <script>
        // ============ 麻将牌字符集 ============
        const TILES = [
            '🀇', '🀈', '🀉', '🀊', '🀋', '🀌', '🀍', '🀎', '🀏', // 0-8:   万
            '🀙', '🀚', '🀛', '🀜', '🀝', '🀞', '🀟', '🀠', '🀡', // 9-17:  筒
            '🀐', '🀑', '🀒', '🀓', '🀔', '🀕', '🀖', '🀗', '🀘', // 18-26: 索
            '🀀', '🀁', '🀂', '🀃', '🀆', '🀅', '🀄' // 27-33: 东南西北白发中
        ];

        const TOTAL_TILE_TYPES = 34;
        const GUESS_LENGTH = 14;
        const MAX_ROWS = 6;

        const KOKUSHI_INDICES = [0, 8, 9, 17, 18, 26, 27, 28, 29, 30, 31, 32, 33];
        const YAOCHU_INDICES = new Set(KOKUSHI_INDICES);
        const YAKUHAI_TRIPLE = [31, 32, 33];

        // ============ 游戏状态 ============
        let targetHand = [];
        let currentGuess = [];
        let currentRow = 0;
        let gameOver = false;
        let keyColors = new Array(TOTAL_TILE_TYPES).fill('');

        let fieldWind = 0;
        let selfWind = 0;
        let isTsumo = true;

        let pendingNumbers = []; // 待处理的数字输入列表（支持连续输入多个数字再按花色）

        // ============ 初始化 ============
        function init() {
            randomizeGameContext();
            updateGameInfoDisplay();
            createBoard();
            createKeyboard();
            generateTargetHand();
            console.log("🎯 答案:", targetHand.map(i => TILES[i]).join(' '));
            console.log("   场风:", getWindName(fieldWind), "自风:", getWindName(selfWind), isTsumo ? "自摸" : "荣和");
        }

        function randomizeGameContext() {
            fieldWind = Math.floor(Math.random() * 4);
            selfWind = Math.floor(Math.random() * 4);
            isTsumo = Math.random() < 0.5;
        }

        function updateGameInfoDisplay() {
            document.getElementById('field-wind-display').innerHTML = TILES[27 + fieldWind] + ' ' + getWindName(
                fieldWind);
            document.getElementById('self-wind-display').innerHTML = TILES[27 + selfWind] + ' ' + getWindName(selfWind);
            document.getElementById('win-method-display').innerHTML = isTsumo ? '🚀 自摸' : '🎯 荣和';
        }

        function getWindName(index) {
            return ['东', '南', '西', '北'][index];
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let r = 0; r < MAX_ROWS; r++) {
                const row = document.createElement('div');
                row.className = 'row';
                row.id = `row-${r}`;
                for (let c = 0; c < GUESS_LENGTH; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    if (c === 13) cell.title = '和牌（第14张）';
                    row.appendChild(cell);
                }
                board.appendChild(row);
            }
        }

        function createKeyboard() {
            const groups = [
                { id: 'row-man', start: 0, end: 8 },
                { id: 'row-pin', start: 9, end: 17 },
                { id: 'row-sou', start: 18, end: 26 },
                { id: 'row-ji', start: 27, end: 33 }
            ];

            groups.forEach(group => {
                const container = document.getElementById(group.id);
                container.innerHTML = '';
                for (let i = group.start; i <= group.end; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    btn.id = `key-${i}`;
                    btn.innerText = TILES[i];
                    btn.title = getTileName(i);
                    btn.onclick = () => addTile(i);
                    container.appendChild(btn);
                }
            });
        }

        function getTileName(index) {
            const suitNames = ['万', '万', '万', '万', '万', '万', '万', '万', '万',
                '筒', '筒', '筒', '筒', '筒', '筒', '筒', '筒', '筒',
                '索', '索', '索', '索', '索', '索', '索', '索', '索'
            ];
            const jiNames = ['东', '南', '西', '北', '白', '发', '中'];
            if (index < 27) {
                const num = (index % 9) + 1;
                return `${num}${suitNames[index]}`;
            } else {
                return jiNames[index - 27];
            }
        }

        /**
         * 根据数字和花色字符计算牌索引
         * @param {number} number - 数字 1-9
         * @param {string} suitChar - 花色字符 'm'|'p'|'s'|'z'
         * @returns {number} 牌索引，无效时返回 -1
         */
        function handleCodeInput(number, suitChar) {
            let suitBase;
            let maxNumber;

            switch (suitChar) {
                case 'm':
                    suitBase = 0;
                    maxNumber = 9;
                    break;
                case 'p':
                    suitBase = 9;
                    maxNumber = 9;
                    break;
                case 's':
                    suitBase = 18;
                    maxNumber = 9;
                    break;
                case 'z':
                    suitBase = 27;
                    maxNumber = 7;
                    break;
                default:
                    return -1;
            }

            if (number < 1 || number > maxNumber) return -1;

            return suitBase + (number - 1);
        }

        // ============ 目标牌型生成 ============
        function generateTargetHand() {
            let valid = false;
            let counts = new Array(TOTAL_TILE_TYPES).fill(0);
            let attempts = 0;
            const maxAttempts = 8000;

            while (!valid && attempts < maxAttempts) {
                attempts++;
                counts.fill(0);
                const rand = Math.random();
                if (rand < 0.04) {
                    valid = tryGenerateKokushi(counts);
                } else if (rand < 0.14) {
                    valid = tryGenerateSevenPairs(counts);
                } else {
                    valid = tryGenerateStandardHand(counts);
                }

                if (valid) {
                    valid = counts.every(c => c <= 4);
                }

                if (valid) {
                    const allTiles = [];
                    for (let i = 0; i < TOTAL_TILE_TYPES; i++) {
                        for (let j = 0; j < counts[i]; j++) {
                            allTiles.push(i);
                        }
                    }
                    const winIdx = Math.floor(Math.random() * allTiles.length);
                    const winningTile = allTiles.splice(winIdx, 1)[0];
                    allTiles.sort((a, b) => a - b);
                    allTiles.push(winningTile);

                    valid = validateFinalHand(allTiles, winningTile);

                    if (valid) {
                        targetHand = allTiles;
                    }
                }
            }

            if (!valid) {
                targetHand = generateFallbackTargetHand();
            }
        }

        function generateFallbackTargetHand() {
            const hand13 = [1, 2, 3, 4, 5, 10, 11, 12, 13, 14, 15, 19, 19];
            const winningTile = 6;
            hand13.sort((a, b) => a - b);
            hand13.push(winningTile);
            return hand13;
        }

        function tryGenerateKokushi(counts) {
            const pairIdx = KOKUSHI_INDICES[Math.floor(Math.random() * KOKUSHI_INDICES.length)];
            for (const idx of KOKUSHI_INDICES) counts[idx] = 1;
            counts[pairIdx] = 2;
            return true;
        }

        function tryGenerateSevenPairs(counts) {
            const available = Array.from({ length: TOTAL_TILE_TYPES }, (_, i) => i);
            for (let i = available.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [available[i], available[j]] = [available[j], available[i]];
            }
            const chosen = available.slice(0, 7);
            for (const idx of chosen) counts[idx] = 2;
            return true;
        }

        function tryGenerateStandardHand(counts) {
            const pair = Math.floor(Math.random() * TOTAL_TILE_TYPES);
            counts[pair] += 2;

            for (let m = 0; m < 4; m++) {
                const isTriplet = Math.random() < 0.3;
                if (isTriplet) {
                    let t;
                    if (Math.random() < 0.5) {
                        const suit = Math.floor(Math.random() * 3);
                        const num = Math.floor(Math.random() * 7) + 1;
                        t = suit * 9 + num;
                    } else {
                        t = Math.floor(Math.random() * TOTAL_TILE_TYPES);
                    }
                    counts[t] += 3;
                } else {
                    const suit = Math.floor(Math.random() * 3);
                    const start = Math.floor(Math.random() * 7);
                    const base = suit * 9 + start;
                    counts[base]++;
                    counts[base + 1]++;
                    counts[base + 2]++;
                }
            }
            return counts.every(c => c <= 4);
        }

        // ============ 役种判断与验证 ============
        function checkHandValidity(counts, winningTile) {
            if (!counts.every(c => c <= 4)) return { valid: false, reason: "存在超过4张的同种牌" };

            if (isKokushiShape(counts)) return { valid: true };
            if (isSevenPairs(counts)) return { valid: true };

            const decompositions = findAllDecompositions(counts);
            if (decompositions.length > 0) {
                if (!isTsumo && !hasYakuForRon(counts, winningTile)) {
                    return { valid: false, reason: "无役！荣和必须至少有一个役（如役牌、平和、断幺等）" };
                }
                return { valid: true };
            }
            return { valid: false, reason: "无法构成有效的和牌型" };
        }

        function validateFinalHand(handArr, winningTile) {
            const counts = new Array(TOTAL_TILE_TYPES).fill(0);
            for (const tile of handArr) counts[tile]++;
            return checkHandValidity(counts, winningTile).valid;
        }

        function validateFullHand(handArr) {
            const counts = new Array(TOTAL_TILE_TYPES).fill(0);
            for (const tile of handArr) counts[tile]++;
            const result = checkHandValidity(counts, handArr[13]);
            if (result.valid) return { valid: true, counts };
            return result;
        }

        function hasYakuForRon(counts, winningTile) {
            const yakuList = getAllYakuFromCounts(counts, winningTile);
            return yakuList.length > 0 && !(yakuList.length === 1 && yakuList[0] === '门清（无其他役）');
        }

        function getAllYakuFromCounts(counts, winningTile) {
            if (isKokushiShape(counts)) return ['国士无双'];
            if (isSevenPairs(counts)) {
                const yaku = ['七对子'];
                if (isTanyao(counts)) yaku.push('断幺九');
                if (isHonitsu(counts)) yaku.push('混一色');
                if (isChinitsu(counts)) yaku.push('清一色');
                return yaku;
            }

            const decompositions = findAllDecompositions(counts);
            let bestYaku = [];
            for (const decomp of decompositions) {
                const currentYaku = detectYakuFromDecomposition(counts, decomp, winningTile);
                if (currentYaku.length > bestYaku.length) {
                    bestYaku = currentYaku;
                }
            }

            if (bestYaku.length === 0) {
                if (isTsumo) return ['门清自摸'];
                return ['门清（无其他役）'];
            }
            return bestYaku;
        }

        function findAllDecompositions(counts) {
            const results = [];
            const used = new Array(TOTAL_TILE_TYPES).fill(0);

            function backtrack(melds, pairIdx) {
                if (melds.length === 4 && pairIdx !== -1) {
                    results.push({ melds: [...melds], pair: pairIdx });
                    return;
                }
                if (pairIdx === -1) {
                    for (let i = 0; i < TOTAL_TILE_TYPES; i++) {
                        if (counts[i] - used[i] >= 2) {
                            used[i] += 2;
                            backtrack(melds, i);
                            used[i] -= 2;
                        }
                    }
                } else {
                    for (let i = 0; i < TOTAL_TILE_TYPES; i++) {
                        if (counts[i] - used[i] >= 3) {
                            used[i] += 3;
                            melds.push({ type: 'triplet', tile: i });
                            backtrack(melds, pairIdx);
                            melds.pop();
                            used[i] -= 3;
                        }
                    }
                    for (let suit = 0; suit < 3; suit++) {
                        for (let num = 0; num < 7; num++) {
                            const i = suit * 9 + num;
                            if (counts[i] - used[i] > 0 && counts[i + 1] - used[i + 1] > 0 && counts[i + 2] - used[i +
                                    2] > 0) {
                                used[i]++;
                                used[i + 1]++;
                                used[i + 2]++;
                                melds.push({ type: 'sequence', start: i });
                                backtrack(melds, pairIdx);
                                melds.pop();
                                used[i]--;
                                used[i + 1]--;
                                used[i + 2]--;
                            }
                        }
                    }
                }
            }

            backtrack([], -1);
            const unique = new Map();
            for (const res of results) {
                const key = JSON.stringify({
                    melds: res.melds.map(m => m.type + (m.start !== undefined ? m.start : m.tile)).sort(),
                    pair: res.pair
                });
                if (!unique.has(key)) unique.set(key, res);
            }
            return [...unique.values()];
        }

        function isRyanmenWaitInDecomp(sequences, winningTile) {
            for (const seq of sequences) {
                const start = seq.start;
                const tiles = [start, start + 1, start + 2];
                if (tiles.includes(winningTile)) {
                    const remaining = tiles.filter(t => t !== winningTile);
                    if (remaining.length !== 2) continue;
                    const [a, b] = remaining.sort((x, y) => x - y);
                    if (b - a === 1) {
                        const num = a % 9;
                        if (num === 0 || num === 7) return false;
                        return true;
                    }
                    return false;
                }
            }
            return false;
        }

        function detectYakuFromDecomposition(counts, decomp, winningTile) {
            const yaku = [];
            const melds = decomp.melds;
            const pair = decomp.pair;

            if (isChinitsu(counts)) {
                yaku.push('清一色');
            } else if (isHonitsu(counts)) {
                yaku.push('混一色');
            }

            if (isTanyao(counts)) yaku.push('断幺九');

            if (hasYakuhaiKotsu(counts, fieldWind, selfWind)) {
                const parts = [];
                if (counts[27 + selfWind] >= 3) parts.push('自风');
                if (counts[27 + fieldWind] >= 3) parts.push('场风');
                if (counts[31] >= 3) parts.push('白');
                if (counts[32] >= 3) parts.push('发');
                if (counts[33] >= 3) parts.push('中');
                yaku.push('役牌(' + parts.join('/') + ')');
            }

            const sequences = melds.filter(m => m.type === 'sequence');
            const triplets = melds.filter(m => m.type === 'triplet');

            if (sequences.length === 4) {
                const yakuhaiSet = new Set([27 + selfWind, 27 + fieldWind, 31, 32, 33]);
                if (!yakuhaiSet.has(pair)) {
                    if (isRyanmenWaitInDecomp(sequences, winningTile)) {
                        yaku.push('平和');
                    }
                }
            }

            const seqCounts = new Map();
            for (const s of sequences) {
                const key = s.start;
                seqCounts.set(key, (seqCounts.get(key) || 0) + 1);
            }

            let isDoubleIipeikou = false;
            if (sequences.length === 4) {
                const values = [...seqCounts.values()];
                if (values.filter(v => v >= 2).length >= 2 || values.some(v => v >= 4)) {
                    isDoubleIipeikou = true;
                }
            }

            if (isDoubleIipeikou) {
                yaku.push('二杯口');
            } else {
                let hasIipeikou = false;
                for (const cnt of seqCounts.values()) {
                    if (cnt >= 2) {
                        hasIipeikou = true;
                        break;
                    }
                }
                if (hasIipeikou) yaku.push('一杯口');
            }

            const suitSeqStarts = [new Set(), new Set(), new Set()];
            for (const s of sequences) {
                const suit = Math.floor(s.start / 9);
                const num = s.start % 9;
                suitSeqStarts[suit].add(num);
            }
            for (let num = 0; num < 9; num++) {
                if (suitSeqStarts[0].has(num) && suitSeqStarts[1].has(num) && suitSeqStarts[2].has(num)) {
                    yaku.push('三色同顺');
                    break;
                }
            }

            for (let suit = 0; suit < 3; suit++) {
                const starts = suitSeqStarts[suit];
                if (starts.has(0) && starts.has(3) && starts.has(6)) {
                    yaku.push('一气通贯');
                    break;
                }
            }

            if (triplets.length === 4) yaku.push('对对和');

            let concealedTriplets = 0;
            for (const t of triplets) {
                const tile = t.tile;
                if (isTsumo || tile !== winningTile) {
                    concealedTriplets++;
                }
            }
            if (concealedTriplets >= 3) yaku.push('三暗刻');

            let isMixedOutside = true;
            for (const m of melds) {
                if (m.type === 'triplet') {
                    if (!YAOCHU_INDICES.has(m.tile)) {
                        isMixedOutside = false;
                        break;
                    }
                } else {
                    if (m.start % 9 !== 0 && m.start % 9 !== 6) {
                        isMixedOutside = false;
                        break;
                    }
                }
            }

            if (isMixedOutside && YAOCHU_INDICES.has(pair)) {
                const hasJi = counts.slice(27).some(c => c > 0);
                if (!hasJi) {
                    yaku.push('纯全带幺九');
                } else {
                    yaku.push('混全带幺九');
                }
            }

            if (counts.every((c, i) => c === 0 || (YAOCHU_INDICES.has(i) && i < 27))) {
                yaku.push('清老头');
            } else if (counts.every((c, i) => c === 0 || YAOCHU_INDICES.has(i))) {
                yaku.push('混老头');
            }

            return yaku;
        }

        function isKokushiShape(counts) {
            return KOKUSHI_INDICES.every(idx => counts[idx] >= 1) &&
                KOKUSHI_INDICES.reduce((sum, idx) => sum + counts[idx], 0) === 14;
        }

        function isSevenPairs(counts) {
            let pairCount = 0;
            for (let i = 0; i < TOTAL_TILE_TYPES; i++) {
                if (counts[i] === 2) pairCount++;
                else if (counts[i] === 4) pairCount += 2;
                else if (counts[i] !== 0) return false;
            }
            return pairCount === 7;
        }

        function isTanyao(counts) {
            for (let i = 0; i < TOTAL_TILE_TYPES; i++) {
                if (counts[i] > 0 && YAOCHU_INDICES.has(i)) return false;
            }
            return true;
        }

        function hasYakuhaiKotsu(counts, fieldWind, selfWind) {
            if (counts[27 + selfWind] >= 3) return true;
            if (counts[27 + fieldWind] >= 3) return true;
            for (const idx of YAKUHAI_TRIPLE) {
                if (counts[idx] >= 3) return true;
            }
            return false;
        }

        function isHonitsu(counts) {
            let suit = -1;
            let hasJi = false;
            for (let i = 0; i < TOTAL_TILE_TYPES; i++) {
                if (counts[i] > 0) {
                    if (i >= 27) hasJi = true;
                    else {
                        const s = Math.floor(i / 9);
                        if (suit === -1) suit = s;
                        else if (suit !== s) return false;
                    }
                }
            }
            return suit !== -1 && hasJi;
        }

        function isChinitsu(counts) {
            let suit = -1;
            for (let i = 0; i < 27; i++) {
                if (counts[i] > 0) {
                    const s = Math.floor(i / 9);
                    if (suit === -1) suit = s;
                    else if (suit !== s) return false;
                }
            }
            for (let i = 27; i < TOTAL_TILE_TYPES; i++) {
                if (counts[i] > 0) return false;
            }
            return suit !== -1;
        }

        // ============ 交互与渲染 ============
        function showHint() {
            const counts = new Array(TOTAL_TILE_TYPES).fill(0);
            for (const idx of targetHand) counts[idx]++;

            const winningTile = targetHand[13];
            const yakuList = getAllYakuFromCounts(counts, winningTile);
            let hintText = '💡 答案役种提示：\n';
            hintText += `场风: ${getWindName(fieldWind)}  自风: ${getWindName(selfWind)}\n`;
            hintText += `和牌: ${isTsumo ? '自摸' : '荣和'}\n`;
            hintText += `役种: ${yakuList.length > 0 ? yakuList.join(' · ') : '无役（仅限自摸）'}`;

            showMessage(hintText, 6000);
        }

        function addTile(tileIndex) {
            if (gameOver || currentGuess.length >= GUESS_LENGTH) return;
            // 通过点击键盘添加牌时，清除pending数字
            pendingNumbers = [];
            if (currentGuess.filter(x => x === tileIndex).length >= 4) {
                showMessage("一种牌最多只能有4张哦～");
                return;
            }
            currentGuess.push(tileIndex);
            updateGrid();
        }

        function deleteTile() {
            if (gameOver) return;
            // 如果有pending数字，先删除最后一个pending
            if (pendingNumbers.length > 0) {
                pendingNumbers.pop();
                updateGrid();
                return;
            }
            if (currentGuess.length === 0) return;
            currentGuess.pop();
            updateGrid();
        }

        function updateGrid() {
            // 清除当前行所有cell
            for (let i = 0; i < GUESS_LENGTH; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                cell.innerText = '';
                cell.className = 'cell';
                cell.title = i === 13 ? '和牌（第14张）' : '';
            }

            // 显示已填入的牌
            for (let i = 0; i < currentGuess.length; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                cell.innerText = TILES[currentGuess[i]];
                cell.classList.add('filled');
            }

            // 显示pending数字（在已确认牌之后依次显示）
            for (let i = 0; i < pendingNumbers.length && currentGuess.length + i < GUESS_LENGTH; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${currentGuess.length + i}`);
                cell.innerText = pendingNumbers[i];
                cell.classList.add('pending-number');
                cell.title = '等待输入花色（按 M/P/S/Z）';
            }
        }

        function showMessage(msg, duration = 2000) {
            const msgBox = document.getElementById('message');
            msgBox.innerText = msg;
            msgBox.classList.add('show-message');
            clearTimeout(msgBox._timeout);
            msgBox._timeout = setTimeout(() => {
                msgBox.classList.remove('show-message');
            }, duration);
        }

        function submitGuess() {
            if (gameOver) return;

            // 如果有pending数字，先清除（用户可能忘记完成输入）
            if (pendingNumbers.length > 0) {
                pendingNumbers = [];
                updateGrid();
            }

            if (currentGuess.length < GUESS_LENGTH) {
                showMessage(`牌数不足14张（当前${currentGuess.length}张）`);
                return;
            }

            const validationResult = validateFullHand(currentGuess);
            if (!validationResult.valid) {
                showMessage(validationResult.reason || "非有效和牌型，请重试");
                return;
            }

            const sortedGuess = sortGuessLikeTarget(currentGuess);
            const targetCopy = [...targetHand];
            const guessCopy = [...sortedGuess];
            const cellColors = new Array(GUESS_LENGTH).fill('absent');

            // 精确匹配
            for (let i = 0; i < GUESS_LENGTH; i++) {
                if (guessCopy[i] === targetCopy[i]) {
                    cellColors[i] = 'correct';
                    targetCopy[i] = -1;
                    guessCopy[i] = -2;
                }
            }

            // 部分匹配
            for (let i = 0; i < GUESS_LENGTH; i++) {
                if (guessCopy[i] >= 0) {
                    const foundIdx = targetCopy.indexOf(guessCopy[i]);
                    if (foundIdx !== -1) {
                        cellColors[i] = 'present';
                        targetCopy[foundIdx] = -1;
                    }
                }
            }

            let allCorrect = true;
            for (let i = 0; i < GUESS_LENGTH; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                cell.innerText = TILES[sortedGuess[i]];
                cell.className = `cell ${cellColors[i]}`;
                if (cellColors[i] !== 'correct') allCorrect = false;
            }

            updateKeyboardColors(sortedGuess, cellColors);

            if (allCorrect) {
                const yakuList = getAllYakuFromCounts(validationResult.counts, sortedGuess[13]);
                const yakuText = yakuList.length > 0 ? yakuList.join(' · ') : '无役';
                showMessage(`🎉 恭喜！你猜对了！\n役种：${yakuText}`, 5000);
                gameOver = true;
                highlightKeyboardAllCorrect();
                return;
            }

            currentRow++;
            currentGuess = [];

            if (currentRow >= MAX_ROWS) {
                const answerStr = targetHand.map(i => TILES[i]).join(' ');
                showMessage(`😢 游戏结束\n答案是: ${answerStr}`, 6000);
                gameOver = true;
            }
        }

        function sortGuessLikeTarget(guess) {
            const first13 = guess.slice(0, 13);
            const lastTile = guess[13];
            first13.sort((a, b) => a - b);
            return [...first13, lastTile];
        }

        function updateKeyboardColors(guess, colors) {
            for (let i = 0; i < GUESS_LENGTH; i++) {
                const tileIdx = guess[i];
                const color = colors[i];
                if (color === 'correct') keyColors[tileIdx] = 'correct';
                else if (color === 'present' && keyColors[tileIdx] !== 'correct') keyColors[tileIdx] = 'present';
                else if (color === 'absent' && keyColors[tileIdx] !== 'correct' && keyColors[tileIdx] !== 'present')
                    keyColors[tileIdx] = 'absent';
            }
            applyKeyColors();
        }

        function highlightKeyboardAllCorrect() {
            for (const tileIdx of targetHand) keyColors[tileIdx] = 'correct';
            applyKeyColors();
        }

        function applyKeyColors() {
            for (let i = 0; i < TOTAL_TILE_TYPES; i++) {
                const btn = document.getElementById(`key-${i}`);
                if (!btn) continue;
                btn.classList.remove('key-correct', 'key-present', 'key-absent');
                if (keyColors[i] === 'correct') btn.classList.add('key-correct');
                else if (keyColors[i] === 'present') btn.classList.add('key-present');
                else if (keyColors[i] === 'absent') btn.classList.add('key-absent');
            }
        }

        // ============ 物理键盘事件处理 ============
        document.addEventListener('keydown', (e) => {
            if (gameOver) return;

            const key = e.key;
            const lowerKey = key.toLowerCase();

            // 删除键
            if (key === 'Backspace' || key === 'Delete') {
                e.preventDefault();
                deleteTile();
                return;
            }

            // 回车键：提交
            if (key === 'Enter') {
                e.preventDefault();
                submitGuess();
                return;
            }

            // 数字键 1-9：添加到pending数字列表
            if (/^[1-9]$/.test(key)) {
                e.preventDefault();
                if (currentGuess.length + pendingNumbers.length >= GUESS_LENGTH) return;
                pendingNumbers.push(parseInt(key, 10));
                updateGrid();
                return;
            }

            // 数字键 0：忽略（无效的麻将代码）
            if (key === '0') {
                e.preventDefault();
                return;
            }

            // 花色键 m/p/s/z：批量转换所有pending数字
            if (['m', 'p', 's', 'z'].includes(lowerKey)) {
                e.preventDefault();
                if (pendingNumbers.length === 0) return;
                if (currentGuess.length + pendingNumbers.length > GUESS_LENGTH) {
                    pendingNumbers = [];
                    updateGrid();
                    return;
                }

                // 先批量计算所有tileIndex，任何非法则整批拒绝
                const tileIndices = [];
                for (const num of pendingNumbers) {
                    const tileIndex = handleCodeInput(num, lowerKey);
                    if (tileIndex === -1) {
                        updateGrid();
                        if (lowerKey === 'z') {
                            showMessage(`无效的字牌代码：${num}z（字牌只有1z~7z）`);
                        } else {
                            showMessage(`无效的牌代码：${num}${lowerKey}`);
                        }
                        return;
                    }
                    tileIndices.push(tileIndex);
                }

                // 检查4张限制（考虑批量添加后的累计数量）
                const tempCounts = {};
                currentGuess.forEach(x => { tempCounts[x] = (tempCounts[x] || 0) + 1; });
                for (const tileIndex of tileIndices) {
                    tempCounts[tileIndex] = (tempCounts[tileIndex] || 0) + 1;
                    if (tempCounts[tileIndex] > 4) {
                        updateGrid();
                        showMessage("一种牌最多只能有4张哦～");
                        return;
                    }
                }

                // 全部通过，批量添加
                for (const tileIndex of tileIndices) {
                    currentGuess.push(tileIndex);
                }
                pendingNumbers = [];
                updateGrid();
                return;
            }

            // 其他按键：如果有pending数字，按了非花色键则忽略（保留pending数字）
            // 不做任何处理
        });

        init();
    </script>
</body>
